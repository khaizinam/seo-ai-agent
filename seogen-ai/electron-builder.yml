appId: com.seogen.ai
productName: SEOGEN AI
copyright: Copyright © 2026 SEOGEN Team

directories:
  output: dist-release
  buildResources: build-resources

files:
  - dist/**
  - dist-electron/**
  - "!src"
  - "!electron"

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build-resources/icon.png
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SEOGEN AI
  artifactName: "SEOGEN_INSTALL.${ext}"

publish:
  provider: github
  owner: seogen
  repo: seogen-ai

